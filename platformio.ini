; ============================================================================
;  ESP32-S3 7.3" 6-Color E-Ink Photo Frame  (GDEP073E01 / E6 panel)
;  Board: ESP32-S3-DevKitC-1  |  16MB QIO Flash  |  8MB OPI (Octal) PSRAM
; ============================================================================

[platformio]
default_envs = esp32s3_eink

[env:esp32s3_eink]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework  = arduino

; ----- Upload / Monitor ------------------------------------------------------
monitor_speed = 115200
upload_speed  = 921600

; ----- Flash + PSRAM layout --------------------------------------------------
; 16MB flash, Octal (OPI) PSRAM. The Arduino memory_type token "qio_opi"
; selects QIO flash mode + OPI PSRAM mode for the S3.
board_build.flash_mode      = qio
board_upload.flash_size     = 16MB
board_build.arduino.memory_type = qio_opi

; Custom partition table (3MB App0 / 3MB App1 / ~9.9MB LittleFS).
board_build.partitions      = partitions.csv
; Tell PlatformIO the data partition is a LittleFS image, not SPIFFS.
board_build.filesystem      = littlefs

; ----- Build flags -----------------------------------------------------------
build_flags =
    ; --- PSRAM ---
    -DBOARD_HAS_PSRAM
    ; --- USB CDC on boot so Serial works over the native USB port ---
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; --- Core debug level (0=None .. 5=Verbose); bump while bringing up ---
    -DCORE_DEBUG_LEVEL=3
    ; --- GxEPD2: keep the per-page buffer small; we keep the full image
    ;     in our own PSRAM buffer and feed GxEPD2 page-by-page ---
    -DMAX_DISPLAY_BUFFER_SIZE=65536

; ----- Library dependencies --------------------------------------------------
; Pinned to known-good major versions; loosen later if you want.
lib_deps =
    ; Display driver + its GFX dependency
    zinggjm/GxEPD2 @ ^1.6.5
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit BusIO @ ^1.16.1
    ; JPEG decode (Bodmer/TJpg_Decoder)
    bodmer/TJpg_Decoder @ ^1.1.0
    ; Async web server (mathieucarbou fork) + matching AsyncTCP
    mathieucarbou/ESPAsyncWebServer @ ^3.3.12
    mathieucarbou/AsyncTCP @ ^3.2.10
    ; JSON for playlist.json
    bblanchon/ArduinoJson @ ^7.1.0
